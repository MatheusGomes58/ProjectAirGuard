<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirGuard | Setup</title>
    <link rel="icon" href="./logo.png">
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <div class="AppFrame">
        <div class="LogoArea">
            <img src="./logo.png" class="LogoJA" alt="Logo">
            <span class="BrandName">AirGuard</span>
        </div>

        <div class="Card">
            <h2>Configurar Wi-Fi</h2>
            <label for="wifiList">Selecione uma rede próxima:</label>
            <ul id="wifiList" class="wifi-list">
                <!-- Redes serão carregadas aqui -->
            </ul>
        </div>
    </div>

    <!-- Modal Connection -->
    <div id="wifiModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <h2>Conectar</h2>
            <form id="loginForm">
                <div class="InputGroup">
                    <label for="ssid">SSID da Rede</label>
                    <input type="text" id="ssid" name="ssid" required readonly>
                </div>

                <div class="InputGroup">
                    <label for="password">Senha</label>
                    <div class="input-container">
                        <input type="password" id="password" name="password" required>
                        <span id="togglePassword" class="show-password">Exibir</span>
                    </div>
                </div>

                <button type="submit">Conectar Agora</button>
            </form>
        </div>
    </div>

    <script src="./script.js"></script>
</body>

</html>
